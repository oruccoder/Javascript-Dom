<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Todo List Project</title>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto max-w-2xl px-4">
        <div class="row flex flex-col mt-10">
            
            <div class="cards bg-white rounded-lg shadow-md overflow-hidden">
                <div class="bg-gray-50 border-b p-4">
                    <h5 class="text-xl font-semibold text-gray-800">Todo List Səhifəsi</h5>
                </div>
                <div class="p-6">
                    <form id="todoAddForm">
                        <input type="text" id="todoName" 
                               class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                               placeholder="Todo Girin">
                        
                        <button id="todoAddButton" type="submit" 
                                class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded text-sm transition duration-200">
                            Todo Əlavə Edin
                        </button>
                    </form>
                </div>

                <hr class="border-gray-200"/>

                <div class="card-body p-6">
                    <h5 class="CardTitle text-xl font-semibold text-gray-800 mb-4">Todo List</h5>
                    <form id="todoListForm">
                        <input id="todoSearch" type="text" 
                               class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" 
                               placeholder="Todo Axtarın">
                    </form>
                    
                    <hr class="my-6 border-gray-200"/>

                    <ul class="divide-y divide-gray-200 border rounded-md" id="list-group">
                        <li class="lists flex justify-between items-center p-4 hover:bg-gray-50 transition">
                            <span class="text-gray-700">Todo 1</span>
                            <a href="#" id="remove1" class="text-red-500 hover:text-red-700">
                                <i class="fa fa-remove"></i>
                            </a>
                        </li>
                        <li class="lists flex justify-between items-center p-4 hover:bg-gray-50 transition">
                            <span class="text-gray-700">Todo 2</span>
                            <a href="#" class="text-red-500 hover:text-red-700">
                                <i class="fa fa-remove"></i>
                            </a>
                        </li>
                        <li class="lists flex justify-between items-center p-4 hover:bg-gray-50 transition">
                            <span class="text-gray-700">Todo 3</span>
                            <a href="#" class="text-red-500 hover:text-red-700">
                                <i class="fa fa-remove"></i>
                            </a>
                        </li>
                    </ul>

                    <a href="#" id="todoClearButton" onclick="changeTitle()"
                       class="inline-block mt-6 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded text-sm transition">
                        Bütün kodları təmizlə
                    </a>
                </div>
            </div>
        </div>
    </div>

    <hr>
    <hr>
    <hr>
    <hr>

    <div id="container">
        <p id="text">Loading...</p>
    </div>

    <button id="btn" class="inline-block mt-6 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded text-sm transition">Change Text</button>
    <br>
    <br>
    

    <script src="main.js"></script>
</body>
</html>
